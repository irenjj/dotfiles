shell /opt/homebrew/bin/bash --login -i
clone-in-kitty

# font
font_family         family='Maple Mono NF CN' style=Medium
bold_font           family='Maple Mono NF CN' style=Bold
font_size 12
dim_opacity 0.9

modify_font cell_width 85%
modify_font cell_height 0px

symbol_map U+00B7 Caskaydiacove Nerd Font Mono ExtraLight Italic
cursor_shape block
cursor_blink_interval 0


# mousel
copy_on_select true
mouse_hide_wait 0
paste_actions quote-urls-at-prompt

# cursor trail
cursor_trail 1
cursor_trail_decay 0.0 0.25
cursor_trail_start_threshold 4


# performance tuning
repaint_delay 0
input_delay 0
sync_to_monitor no
macos_custom_beam_cursor yes


# window layout
hide_window_decorations titlebar-only
window_padding 0
confirm_os_window_close 0
enabled_layouts splits,stack
window_border_width 0.5pt


# tab bar
tab_bar_edge top
tab_bar_align center
tab_bar_style separator
tab_separator ""
# light theme backup
# tab_title_template "{fmt.fg.black}{fmt.bg.white}  {index}:{title.split()[0]}"
# active_tab_title_template "{fmt.fg.orange}{fmt.bg.white}  {index}:{title.split()[0]}"
tab_title_template "  {index}:{title.split()[0]}"
active_tab_title_template "  {index}:{title.split()[0]}"
active_tab_font_style bold
inactive_tab_font_style bold
tab_bar_min_tabs 100
tab_title_max_length 10

# advanced
shell_integration no-cursor

enable_audio_bell no

# keybinding
# unmap
map ctrl+shift+equal no_op
map ctrl+shift+minus no_op
map ctrl+tab no_op
map cmd+r no_op
map cmd+, no_op
# tab management
# cycle tabs (kitty)
map cmd+e next_tab
# map cmd+1 goto_tab 1
# map cmd+2 goto_tab 2
# map cmd+3 goto_tab 3
# map cmd+4 goto_tab 4
# map cmd+5 goto_tab 5
# map cmd+6 goto_tab 6
# map cmd+7 goto_tab 7
# map cmd+8 goto_tab 8
# map cmd+9 goto_tab 9
# font size
map cmd+equal change_font_size all +0.5
map cmd+minus change_font_size all -0.5
map cmd+0 change_font_size all 0
# window
# map cmd+shift+w close_tab
# map cmd+\ launch --location=split --cwd=current
# map cmd+h neighboring_window left
# map cmd+l neighboring_window right
# map cmd+r layout_action rotate
# map cmd+shift+= resize_window wider 5
# map cmd+shift+- resize_window narrower 5
# map cmd+ctrl+= resize_window taller 5
# map cmd+ctrl+- resize_window shorter 5
# map cmd+m toggle_layout stack


# tmux config
map cmd+f send_text all \x06c
map cmd+w send_text all \x06w
map cmd+s send_text all \x06-
map cmd+d send_text all \x06=
map cmd+m send_text all \x06m
map cmd+t send_text all \x06t

map cmd+i send_text all \x06i
map cmd+o send_text all \x06o

map cmd+1 send_text all \x061
map cmd+2 send_text all \x062
map cmd+3 send_text all \x063
map cmd+4 send_text all \x064
map cmd+5 send_text all \x065
map cmd+6 send_text all \x066
map cmd+7 send_text all \x067
map cmd+8 send_text all \x068
map cmd+9 send_text all \x069

map cmd+h send_text all \x06h
map cmd+j send_text all \x06j
map cmd+k send_text all \x06k
map cmd+l send_text all \x06l

map cmd+shift+h send_text all \x06H
map cmd+shift+j send_text all \x06J
map cmd+shift+k send_text all \x06K
map cmd+shift+l send_text all \x06L


background #ffffff
foreground #000000
cursor #666666
selection_background #e5e5e6
color0 #000000
color8 #000000
color1 #de3d35
color9 #de3d35
color2 #3e953a
color10 #3e953a
color3 #d2b67b
color11 #d2b67b
color4 #2f5af3
color12 #2f5af3
color5 #950095
color13 #a00095
color6 #3e953a
color14 #3e953a
color7 #bbbbbb
color15 #ffffff
selection_foreground #2a2b33
